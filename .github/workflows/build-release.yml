name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - name: Check tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match app.json version $VERSION — skipping build."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        run: |
          OUTPUT=$(eas build --platform android --profile preview --non-interactive --wait --json 2>&1)
          echo "$OUTPUT"
          BUILD_URL=$(echo "$OUTPUT" | grep -o 'https://expo\.dev[^"]*\.apk' | head -1)
          echo "artifact_url=$(echo $OUTPUT | jq -r '.[0].artifacts.buildUrl' 2>/dev/null)" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.artifact_url }}" \
            -o "victoires-imf-v${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Version ${{ steps.version.outputs.version }}"
          files: victoires-imf-v${{ steps.version.outputs.version }}.apk
          body: |
            ## Nouveautés
            - 🔔 Correction des notifications push Android : le token n'était jamais enregistré au démarrage
            - 📲 Token push enregistré automatiquement à l'ouverture de l'app
            - 🍎 Support des notifications push pour iOS (site web ajouté à l'écran d'accueil)
            - ❌ Rappel dispo : "Tu n'as pas encore renseigné tes dispos pour la semaine prochaine !"
            - ✅ Notif quand les 4 ont répondu avec la ou les meilleures dates
            - 🎮 Notif le jour de la session : "N'oublies pas que ce soir on gagne ! 🏆"
