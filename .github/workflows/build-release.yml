name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - name: Check tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match app.json version $VERSION — skipping build."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        run: |
          eas build --platform android --profile preview --non-interactive --wait 2>&1 | tee build_output.txt
          ARTIFACT_URL=$(grep -oP 'https://\S+\.apk' build_output.txt | head -1)
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          cat build_output.txt

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.artifact_url }}" \
            -o "victoires-imf-v${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Version ${{ steps.version.outputs.version }}"
          files: victoires-imf-v${{ steps.version.outputs.version }}.apk
          body: |
            ## Nouveautés v1.0.7

            ### 🏆 Onglet Victoires
            - Nouvel onglet dédié avec la liste complète des victoires par saison IMF
            - Sélecteur de saison (2025, 2026…) avec dates de début/fin
            - Victoires PUBG + victoires saisies manuellement
            - Détail complet : carte, finisher, joueurs avec kills/dommages

            ### 📊 Stats par saison
            - Filtrage des statistiques par saison IMF
            - Sélecteur de saison harmonisé avec l'onglet Victoires

            ### 💀 Zone bleue
            - Détection automatique quand le dernier ennemi meurt de la zone bleue
            - "Zone bleue" affiché en bleu dans les matchs récents et l'onglet Victoires
            - 5e ligne dans le Top Finisher avec icône ⚡

            ### 🔔 Notifications victoires
            - Envoi à heure fixe : 10h00 (plus d'aléatoire)
            - Vérifie les victoires dans `player_match_stats` ET `imf_season_wins`
            - Texte avec nom de la carte pour 1 victoire, compte pour plusieurs

            ### 🎨 Interface
            - Finisher affiché dans les matchs récents (page Stats)
            - Win Rate en blanc, accent orange sur Moy. dommages/match uniquement
            - Icône de notification Android : silhouette IMF blanche sur fond orange
