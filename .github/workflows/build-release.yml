name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - name: Check tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match app.json version $VERSION — skipping build."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        run: |
          eas build --platform android --profile preview --non-interactive --wait 2>&1 | tee build_output.txt
          ARTIFACT_URL=$(grep -oP 'https://\S+\.apk' build_output.txt | head -1)
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          cat build_output.txt

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.artifact_url }}" \
            -o "victoires-imf-v${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Version ${{ steps.version.outputs.version }}"
          files: victoires-imf-v${{ steps.version.outputs.version }}.apk
          body: |
            ## Correctifs
            - 🌍 Corrige un décalage d'un jour dans le calcul de "cette semaine" pour les joueurs dans un fuseau horaire éloigné de la France (ex: Amérique du Nord) — les disponibilités étaient rangées sous une semaine différente de celle des autres joueurs, les rendant invisibles mutuellement
