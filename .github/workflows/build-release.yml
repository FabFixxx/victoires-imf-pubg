name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - name: Check tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match app.json version $VERSION — skipping build."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        run: |
          OUTPUT=$(eas build --platform android --profile preview --non-interactive --wait --json 2>/dev/null)
          echo "artifact_url=$(echo $OUTPUT | jq -r '.[0].artifacts.buildUrl')" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.artifact_url }}" \
            -o "victoires-imf-v${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Version ${{ steps.version.outputs.version }}"
          files: victoires-imf-v${{ steps.version.outputs.version }}.apk
          body: |
            ## Nouveautés
            - 🔔 Correction des notifications push Android : le token n'était jamais enregistré au démarrage pour les utilisateurs existants
            - 📲 L'enregistrement du token se fait maintenant automatiquement à l'ouverture de l'app
            - 🍎 Support des notifications push pour les utilisateurs iOS (via le site web ajouté à l'écran d'accueil)
            - ✅ Correction de la notification "tout le monde a répondu" sur iOS web
            - 📅 Correction des rappels de disponibilités hebdomadaires sur iOS web
