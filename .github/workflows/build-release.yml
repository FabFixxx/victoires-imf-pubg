name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - name: Check tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match app.json version $VERSION — skipping build."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        run: |
          OUTPUT=$(eas build --platform android --profile preview --non-interactive --wait --json 2>/dev/null)
          echo "artifact_url=$(echo $OUTPUT | jq -r '.[0].artifacts.buildUrl')" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.artifact_url }}" \
            -o "victoires-imf-v${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Version ${{ steps.version.outputs.version }}"
          files: victoires-imf-v${{ steps.version.outputs.version }}.apk
          body: |
            ## Nouveautés
            - 📅 Page Sessions entièrement refaite : meilleures dates cette semaine et semaine prochaine
            - ✅ Statut "A répondu / En attente" par joueur pour la semaine prochaine
            - 🚫 Bouton "Je ne suis pas dispo" pour signaler une semaine sans disponibilité
            - ⭐ Date retenue : sélectionnable manuellement quand plusieurs dates ont 4 votes
            - 🔔 Rappel quotidien (dim–ven 17h) uniquement aux joueurs n'ayant pas encore répondu
            - 🎮 Notification le soir de la session à 18h sur la date retenue
            - ⚙️ Réglages notifications dans les paramètres (heure rappel + heure soir de session)
